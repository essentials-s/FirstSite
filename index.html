<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Универсальный Калькулятор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
    <!-- ===== HEADER ===== -->
    <header class="header">
        <h1>🧮 Универсальный Калькулятор</h1>
        <p class="subtitle">Всё в одном месте</p>
    </header>

    <!-- ===== TABS ===== -->
    <nav class="tabs">
        <button class="tab active" data-tab="basic">🔢 Обычный</button>
        <button class="tab" data-tab="weight">⚖️ Вес</button>
        <button class="tab" data-tab="data">💾 Данные</button>
        <button class="tab" data-tab="finance">💰 Финансы</button>
    </nav>

    <!-- ===== 1. ОБЫЧНЫЙ КАЛЬКУЛЯТОР ===== -->
    <section class="calculator-section active" id="basic">
        <div class="basic-calc">
            <div class="display">
                <div class="display-expression" id="expression"></div>
                <div class="display-result" id="result">0</div>
            </div>
            <div class="buttons">
                <button class="btn btn-clear" onclick="clearCalc()">AC</button>
                <button class="btn btn-operator" onclick="appendCalc('(')">(</button>
                <button class="btn btn-operator" onclick="appendCalc(')')">)</button>
                <button class="btn btn-operator" onclick="appendCalc('/')">÷</button>

                <button class="btn" onclick="appendCalc('7')">7</button>
                <button class="btn" onclick="appendCalc('8')">8</button>
                <button class="btn" onclick="appendCalc('9')">9</button>
                <button class="btn btn-operator" onclick="appendCalc('*')">×</button>

                <button class="btn" onclick="appendCalc('4')">4</button>
                <button class="btn" onclick="appendCalc('5')">5</button>
                <button class="btn" onclick="appendCalc('6')">6</button>
                <button class="btn btn-operator" onclick="appendCalc('-')">−</button>

                <button class="btn" onclick="appendCalc('1')">1</button>
                <button class="btn" onclick="appendCalc('2')">2</button>
                <button class="btn" onclick="appendCalc('3')">3</button>
                <button class="btn btn-operator" onclick="appendCalc('+')">+</button>

                <button class="btn" onclick="appendCalc('0')">0</button>
                <button class="btn" onclick="appendCalc('.')">.</button>
                <button class="btn btn-backspace" onclick="backspace()">⌫</button>
                <button class="btn btn-equals" onclick="calculate()">=</button>
            </div>
        </div>
    </section>

    <!-- ===== 2. КОНВЕРТЕР ВЕСА ===== -->
    <section class="calculator-section" id="weight">
        <div class="converter-card">
            <h2>⚖️ Конвертер Веса</h2>
            <div class="converter-row">
                <div class="input-group">
                    <label>Значение</label>
                    <input type="number" id="weightValue" placeholder="Введите вес" oninput="convertWeight()">
                </div>
                <div class="input-group">
                    <label>Из</label>
                    <select id="weightFrom" onchange="convertWeight()">
                        <option value="mg">Миллиграмм (мг)</option>
                        <option value="g">Грамм (г)</option>
                        <option value="kg" selected>Килограмм (кг)</option>
                        <option value="t">Тонна (т)</option>
                        <option value="lb">Фунт (lb)</option>
                        <option value="oz">Унция (oz)</option>
                        <option value="ct">Карат (ct)</option>
                    </select>
                </div>
                <button class="swap-btn" onclick="swapWeight()" title="Поменять местами">⇄</button>
                <div class="input-group">
                    <label>В</label>
                    <select id="weightTo" onchange="convertWeight()">
                        <option value="mg">Миллиграмм (мг)</option>
                        <option value="g">Грамм (г)</option>
                        <option value="kg">Килограмм (кг)</option>
                        <option value="t">Тонна (т)</option>
                        <option value="lb" selected>Фунт (lb)</option>
                        <option value="oz">Унция (oz)</option>
                        <option value="ct">Карат (ct)</option>
                    </select>
                </div>
            </div>
            <div class="result-box" id="weightResult">
                <span class="result-label">Результат:</span>
                <span class="result-value">—</span>
            </div>
            <!-- Таблица всех единиц -->
            <div class="all-units" id="weightAllUnits"></div>
        </div>
    </section>

    <!-- ===== 3. КОНВЕРТЕР ДАННЫХ ===== -->
    <section class="calculator-section" id="data">
        <div class="converter-card">
            <h2>💾 Конвертер Данных</h2>
            <div class="converter-row">
                <div class="input-group">
                    <label>Значение</label>
                    <input type="number" id="dataValue" placeholder="Введите размер" oninput="convertData()">
                </div>
                <div class="input-group">
                    <label>Из</label>
                    <select id="dataFrom" onchange="convertData()">
                        <option value="bit">Бит (b)</option>
                        <option value="byte">Байт (B)</option>
                        <option value="kb">Килобайт (KB)</option>
                        <option value="mb" selected>Мегабайт (MB)</option>
                        <option value="gb">Гигабайт (GB)</option>
                        <option value="tb">Терабайт (TB)</option>
                        <option value="pb">Петабайт (PB)</option>
                    </select>
                </div>
                <button class="swap-btn" onclick="swapData()" title="Поменять местами">⇄</button>
                <div class="input-group">
                    <label>В</label>
                    <select id="dataTo" onchange="convertData()">
                        <option value="bit">Бит (b)</option>
                        <option value="byte">Байт (B)</option>
                        <option value="kb">Килобайт (KB)</option>
                        <option value="mb">Мегабайт (MB)</option>
                        <option value="gb" selected>Гигабайт (GB)</option>
                        <option value="tb">Терабайт (TB)</option>
                        <option value="pb">Петабайт (PB)</option>
                    </select>
                </div>
            </div>
            <div class="data-standard-toggle">
                <button class="std-btn active" data-std="binary" onclick="setDataStandard('binary')">Двоичная (1024)</button>
                <button class="std-btn" data-std="decimal" onclick="setDataStandard('decimal')">Десятичная (1000)</button>
            </div>
            <div class="result-box" id="dataResult">
                <span class="result-label">Результат:</span>
                <span class="result-value">—</span>
            </div>
            <div class="all-units" id="dataAllUnits"></div>
        </div>
    </section>

    <!-- ===== 4. ФИНАНСОВЫЙ КАЛЬКУЛЯТОР ===== -->
    <section class="calculator-section" id="finance">
        <div class="converter-card">
            <h2>💰 Финансовый Калькулятор</h2>

            <!-- Sub-tabs -->
            <div class="sub-tabs">
                <button class="sub-tab active" data-subtab="loan" onclick="switchFinanceTab('loan')">🏦 Кредит</button>
                <button class="sub-tab" data-subtab="deposit" onclick="switchFinanceTab('deposit')">📈 Вклад</button>
                <button class="sub-tab" data-subtab="currency" onclick="switchFinanceTab('currency')">💱 Скидка</button>
            </div>

            <!-- Кредит -->
            <div class="finance-panel active" id="panel-loan">
                <div class="finance-inputs">
                    <div class="input-group">
                        <label>Сумма кредита (₽)</label>
                        <input type="number" id="loanAmount" placeholder="1 000 000" value="1000000">
                    </div>
                    <div class="input-group">
                        <label>Ставка (% годовых)</label>
                        <input type="number" id="loanRate" placeholder="12" value="12" step="0.1">
                    </div>
                    <div class="input-group">
                        <label>Срок (месяцев)</label>
                        <input type="number" id="loanMonths" placeholder="24" value="24">
                    </div>
                </div>
                <button class="calc-btn" onclick="calculateLoan()">Рассчитать кредит</button>
                <div class="finance-results" id="loanResults"></div>
            </div>

            <!-- Вклад -->
            <div class="finance-panel" id="panel-deposit">
                <div class="finance-inputs">
                    <div class="input-group">
                        <label>Сумма вклада (₽)</label>
                        <input type="number" id="depositAmount" placeholder="500 000" value="500000">
                    </div>
                    <div class="input-group">
                        <label>Ставка (% годовых)</label>
                        <input type="number" id="depositRate" placeholder="18" value="18" step="0.1">
                    </div>
                    <div class="input-group">
                        <label>Срок (месяцев)</label>
                        <input type="number" id="depositMonths" placeholder="12" value="12">
                    </div>
                    <div class="input-group">
                        <label>Капитализация</label>
                        <select id="depositCap">
                            <option value="monthly">Ежемесячная</option>
                            <option value="quarterly">Ежеквартальная</option>
                            <option value="yearly">Ежегодная</option>
                            <option value="none">Без капитализации</option>
                        </select>
                    </div>
                </div>
                <button class="calc-btn" onclick="calculateDeposit()">Рассчитать вклад</button>
                <div class="finance-results" id="depositResults"></div>
            </div>

            <!-- Скидка -->
            <div class="finance-panel" id="panel-currency">
                <div class="finance-inputs">
                    <div class="input-group">
                        <label>Исходная цена (₽)</label>
                        <input type="number" id="originalPrice" placeholder="5000" value="5000">
                    </div>
                    <div class="input-group">
                        <label>Скидка (%)</label>
                        <input type="number" id="discountPercent" placeholder="25" value="25" step="0.1">
                    </div>
                </div>
                <button class="calc-btn" onclick="calculateDiscount()">Рассчитать скидку</button>
                <div class="finance-results" id="discountResults"></div>
            </div>
        </div>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
